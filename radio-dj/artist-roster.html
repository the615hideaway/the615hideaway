<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/radio-dj/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Radio Now — Label artist roster.">
  <title>Artist Roster — Radio Now</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="artist-portal-body">

  <div id="app-shell" class="app-shell hidden">
    <div class="artist-portal-chrome">
      <a href="artist-dashboard.html" class="artist-portal-chrome-brand">
        <img src="assets/logo.png" alt="" class="artist-portal-chrome-logo">
        <span>Radio Now</span>
      </a>
      <div class="artist-portal-chrome-actions">
        <a href="artist-promo.html" class="artist-portal-chrome-link">Your Music</a>
        <a href="charts.html" class="artist-portal-chrome-link">Charts</a>
        <span id="artist-welcome" class="artist-portal-welcome hidden"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn" aria-label="Log out">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>

    <nav class="artist-portal-nav" data-artist-portal-nav></nav>

    <main class="artist-portal-page">
      <header class="artist-portal-hero">
        <p class="artist-portal-eyebrow">Roster</p>
        <h1>Artist roster</h1>
        <p id="page-copy" class="artist-portal-copy">Create profiles for artists on your label.</p>
      </header>

      <div id="label-roster-list" class="label-roster-list label-roster-list--page"></div>

      <section class="artist-portal-card">
        <h2 class="artist-portal-card-title"><i class="fa-solid fa-user-plus"></i> Create artist profile</h2>
        <form id="create-profile-form" class="dashboard-form">
          <div class="login-error" id="create-profile-error"></div>
          <label for="create-profile-artist-name">Artist name</label>
          <input type="text" id="create-profile-artist-name" placeholder="As it will appear on Radio Now" required>
          <label for="create-profile-claim-email">Artist email <span class="label-optional">(for claim)</span></label>
          <input type="email" id="create-profile-claim-email" placeholder="artist@email.com">
          <button type="submit" class="btn btn-secondary btn-full">
            <i class="fa-solid fa-user-plus"></i>
            Create profile
          </button>
        </form>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/demo.js"></script>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-auth.js"></script>
  <script src="js/dj-boot.js"></script>
  <script src="js/dj-auth.js"></script>
  <script src="js/artist-auth.js"></script>
  <script src="js/account-auth.js"></script>
  <script src="js/artist-auth-ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/artist-portal-nav.js"></script>
  <script src="js/artist-portal-auth.js"></script>
  <script src="js/artist-activity.js"></script>
  <script src="js/artist-roster-app.js"></script>
</body>
</html>
