<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/radio-dj/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Radio Now — Submit a new song.">
  <title>Submit Song — Radio Now</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="artist-portal-body">

  <div id="app-shell" class="app-shell hidden">
    <div class="artist-portal-chrome">
      <a href="artist-dashboard.html" class="artist-portal-chrome-brand">
        <img src="assets/logo.png" alt="" class="artist-portal-chrome-logo">
        <span>Radio Now</span>
      </a>
      <div class="artist-portal-chrome-actions">
        <a href="artist-promo.html" class="artist-portal-chrome-link">Your Music</a>
        <a href="charts.html" class="artist-portal-chrome-link">Charts</a>
        <span id="artist-welcome" class="artist-portal-welcome hidden"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn" aria-label="Log out">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>

    <nav class="artist-portal-nav" data-artist-portal-nav></nav>

    <main class="artist-portal-page">
      <header class="artist-portal-hero">
        <p class="artist-portal-eyebrow">Submit</p>
        <h1 id="page-title">Submit a new song</h1>
        <p id="page-copy" class="artist-portal-copy">Upload MP3 and cover art to Supabase. We review and add approved songs to the catalog.</p>
      </header>

      <section class="artist-portal-card">
        <p class="artist-portal-card-note" id="song-submit-note">Submissions are stored securely and emailed to Radio Now for review.</p>
        <form id="song-submit-form" class="artist-submit-form">
          <div class="form-grid">
            <label>Artist name <input type="text" id="submit-artist-name" required></label>
            <label>Song title <input type="text" id="submit-song-title" required></label>
            <label>Music style <input type="text" id="submit-music-style"></label>
            <label>Year <input type="text" id="submit-year" inputmode="numeric"></label>
            <label>Contact email <input type="email" id="submit-contact-email"></label>
            <label>MP3 file <input type="file" id="submit-mp3" accept="audio/mpeg,audio/mp3,.mp3" required></label>
            <label>Cover art <input type="file" id="submit-cover" accept="image/*" required></label>
            <label>WAV file (optional) <input type="file" id="submit-wav" accept="audio/wav,.wav"></label>
          </div>
          <label class="form-full">Description <textarea id="submit-description" rows="4"></textarea></label>
          <p id="song-submit-status" class="login-error hidden" role="alert"></p>
          <button type="submit" class="btn btn-primary btn-lg btn-full" id="song-submit-btn">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            Submit to Radio Now
          </button>
        </form>
        <p class="field-help">Need help? Email <a href="mailto:radio@the615hideaway.com">radio@the615hideaway.com</a>.</p>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/demo.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-auth.js"></script>
  <script src="js/dj-boot.js"></script>
  <script src="js/dj-auth.js"></script>
  <script src="js/artist-boot.js"></script>
  <script src="js/artist-auth.js"></script>
  <script src="js/account-auth.js"></script>
  <script src="js/artist-auth-ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/artist-portal-nav.js"></script>
  <script src="js/artist-portal-auth.js"></script>
  <script src="js/artist-submit-app.js"></script>
</body>
</html>
